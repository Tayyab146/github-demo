apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager
  target:
    name: app-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /app/production/database
        property: url
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /app/production/redis
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: /app/production/auth
        property: jwtSecret
